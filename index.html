<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デザインスタディノート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #e8e8e8;
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      min-height: 100vh;
      padding: 56px 40px 80px;
    }

    /* ─── ページヘッダー ─── */
    .site-header {
      max-width: 960px;
      margin: 0 auto 48px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 24px;
    }

    .site-label {
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }

    .site-title {
      font-size: 28px;
      font-weight: 500;
      color: #111;
      line-height: 1.2;
    }

    /* ─── リスト ─── */
    .study-list {
      max-width: 960px;
      margin: 0 auto;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── 各エントリー ─── */
    .study-list li a {
      display: flex;
      align-items: center;
      gap: 24px;
      background: #fff;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 20px 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .study-list li a:hover {
      border-color: #8bf378;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .entry-number {
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #aaa;
      flex-shrink: 0;
      width: 28px;
    }

    .entry-title {
      font-size: 18px;
      font-weight: 400;
      color: #111;
      flex: 1;
    }

    .entry-tags {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .tag {
      background: #2eb017;
      color: #fff;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      padding: 3px 10px;
      border-radius: 5px;
      white-space: nowrap;
    }

    .entry-arrow {
      font-size: 16px;
      color: #ccc;
      flex-shrink: 0;
      margin-left: 8px;
      transition: color 0.15s, transform 0.15s;
    }

    .study-list li a:hover .entry-arrow {
      color: #8bf378;
      transform: translateX(3px);
    }

    /* ─── レスポンシブ ─── */
    @media (max-width: 600px) {
      body {
        padding: 32px 16px 60px;
      }

      .site-title {
        font-size: 22px;
      }

      .study-list li a {
        padding: 16px 20px;
        gap: 16px;
      }

      .entry-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <p class="site-label">Design Study Notes</p>
    <h1 class="site-title">デザインスタディノート</h1>
  </header>

  <ul class="study-list">

    <li>
      <a href="01_yoyaku-machijikan.html">
        <span class="entry-number">01</span>
        <span class="entry-title">予約システムの待ち時間の表示画面</span>
        <span class="entry-tags">
          <span class="tag">UI/UX</span>
          <span class="tag">SP</span>
        </span>
        <span class="entry-arrow">→</span>
      </a>
    </li>

    <li>
      <a href="02_toaster-feature.html">
        <span class="entry-number">02</span>
        <span class="entry-title">トースターで新機能を表示する画面</span>
        <span class="entry-tags">
          <span class="tag">UI/UX</span>
          <span class="tag">SP</span>
        </span>
        <span class="entry-arrow">→</span>
      </a>
    </li>

    <!-- 今後ここに追加 -->

  </ul>

</body>
</html>
